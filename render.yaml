services:
  - type: web
    name: greenscope-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: greenscope-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://greenscope.vercel.app  # change this to your Vercel URL

databases:
  - name: greenscope-db
    plan: free
